name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0) — tag must already exist on main"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          BARE="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "bare=$BARE" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.bare }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf '%s' "$RELEASE_NOTES" > /tmp/release-notes.md
          gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1 && exit 0
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md

      - name: Check gem published
        id: check_gem
        run: |
          BARE="${{ steps.version.outputs.bare }}"
          if curl -fsL "https://rubygems.org/downloads/__GEM_NAME__-${BARE}.gem" -o /dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure RubyGems credentials
        if: steps.check_gem.outputs.already_published != 'true'
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build and push gem
        if: steps.check_gem.outputs.already_published != 'true'
        run: |
          bundle exec rake build
          gem push pkg/__GEM_NAME__-*.gem

      - name: Compute gem SHA256
        id: sha
        run: |
          BARE="${{ steps.version.outputs.bare }}"
          GEM_FILE="/tmp/__GEM_NAME__-${BARE}.gem"
          curl -fsSL "https://rubygems.org/downloads/__GEM_NAME__-${BARE}.gem" -o "$GEM_FILE"
          SHA=$(sha256sum "$GEM_FILE" | cut -d' ' -f1)
          echo "gem=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          BARE: ${{ steps.version.outputs.bare }}
          GEM_SHA: ${{ steps.sha.outputs.gem }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/danhorst/homebrew-tap.git" tap

          python3 - <<'PYEOF'
          import re, os

          formula_path = "tap/Formula/__FORMULA_NAME__.rb"
          bare    = os.environ["BARE"]
          gem_sha = os.environ["GEM_SHA"]

          text = open(formula_path).read()

          text = re.sub(
            r'url "https://rubygems\.org/downloads/__GEM_NAME__-[^"]+"',
            f'url "https://rubygems.org/downloads/__GEM_NAME__-{bare}.gem"',
            text,
          )
          text = re.sub(
            r'sha256 "[a-f0-9]+"',
            f'sha256 "{gem_sha}"',
            text,
          )

          open(formula_path, "w").write(text)
          print("Formula updated.")
          PYEOF

          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/__FORMULA_NAME__.rb
          git -C tap diff --cached --quiet && echo "Tap already up to date, skipping." && exit 0
          git -C tap commit -m "Update __GEM_NAME__ to v${BARE}"
          git -C tap push

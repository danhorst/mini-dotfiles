name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.0) — tag must already exist on the default branch"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Pin to the tag on both trigger paths — a workflow_dispatch checkout
          # of branch HEAD may predate the release commit, yielding empty notes.
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Optional: language setup + test/build verification before releasing.
      # - uses: actions/setup-go@v6
      #   with:
      #     go-version-file: go.mod
      # - name: Verify build and tests
      #   run: |
      #     go vet ./...
      #     go test ./...
      #     go build ./...

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          BARE="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "bare=$BARE" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.bare }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "Error: no changelog entry found for $VERSION — refusing to create a release with empty notes"
            exit 1
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute source tarball SHA256
        id: sha
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          URL="https://github.com/danhorst/__REPO__/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "source=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf '%s' "$RELEASE_NOTES" > /tmp/release-notes.md
          gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1 && exit 0
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md

      - name: Update tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          BARE: ${{ steps.version.outputs.bare }}
          SOURCE_SHA: ${{ steps.sha.outputs.source }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/danhorst/homebrew-tap.git" tap

          python3 - <<'PYEOF'
          import re, os

          formula_path = "tap/Formula/__FORMULA_NAME__.rb"
          tag      = os.environ["TAG"]
          src_sha  = os.environ["SOURCE_SHA"]

          text = open(formula_path).read()

          text = re.sub(
            r'url "https://github\.com/danhorst/__REPO__/archive/refs/tags/v[^"]+"',
            f'url "https://github.com/danhorst/__REPO__/archive/refs/tags/{tag}.tar.gz"',
            text,
          )
          text = re.sub(
            r'sha256 "[a-f0-9]+"',
            f'sha256 "{src_sha}"',
            text,
          )

          open(formula_path, "w").write(text)
          print("Formula updated.")
          PYEOF

          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/__FORMULA_NAME__.rb
          git -C tap diff --cached --quiet && echo "Tap already up to date, skipping." && exit 0
          git -C tap commit -m "Update __REPO__ to ${TAG}"
          git -C tap push
